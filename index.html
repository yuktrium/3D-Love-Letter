<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Love Letter</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="background"></div>

    <div class="scene">
      <div class="shadow"></div>

      <div class="envelope" id="envelope">
        <!-- Back -->
        <div class="back"></div>

        <!-- Letter -->
        <div class="letter-wrapper">
          <div class="letter">
            <div class="paper">
              <!-- Left -->
              <section class="panel left">
                <div class="inside">
                  <h2>To My Love</h2>

                  <p>
                    Every smile of yours brightens my life. Thank you for being
                    the best part of every day.
                  </p>
                </div>
              </section>

              <!-- Center -->

              <section class="panel center">
                <div class="cover">
                  <span class="mini"> A </span>

                  <h1>Love</h1>

                  <h2>Letter</h2>

                  <div class="heart">❤</div>
                </div>
              </section>

              <!-- Right -->

              <section class="panel right">
                <div class="inside">
                  <h2>Forever</h2>

                  <p>
                    Thank you for every laugh, every hug, every memory and every
                    dream.
                  </p>
                </div>
              </section>
            </div>
          </div>
        </div>

        <!-- Pocket -->

        <div class="pocket">
          <div class="left-fold"></div>

          <div class="right-fold"></div>
        </div>

        <!-- Flap -->

        <div class="flap">
          <div class="seal">❤</div>
        </div>
      </div>
    </div>

    <div class="hint" id="hint">Tap the Envelope</div>

    <script src="script.js"></script>
  </body>
</html>
